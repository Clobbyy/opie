name: Build macOS installers

# Build the .pkg and .dmg on a real Mac. Manual runs publish them as workflow
# artifacts; pushing a version tag (v*) also attaches them to a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/upload the release on tag pushes

jobs:
  installers:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build installers
        run: |
          bash packaging/build_pkg.sh
          bash packaging/build_dmg.sh
          ls -lh dist

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opie-macos-installers
          path: |
            dist/*.pkg
            dist/*.dmg
          if-no-files-found: error

      - name: Attach installers to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            && gh release upload "$GITHUB_REF_NAME" dist/*.pkg dist/*.dmg --clobber \
            || gh release create "$GITHUB_REF_NAME" dist/*.pkg dist/*.dmg \
                 --title "Opie $GITHUB_REF_NAME" --generate-notes
